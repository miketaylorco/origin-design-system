name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, test & quality checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Token pipeline ────────────────────────────────────────────────────
      - name: Build tokens
        run: pnpm build-tokens

      # ── Static analysis ───────────────────────────────────────────────────
      - name: Type check
        run: pnpm turbo typecheck --ui=stream

      # ── Tests ─────────────────────────────────────────────────────────────
      - name: Unit tests
        run: pnpm turbo test --ui=stream

      # ── Storybook build ───────────────────────────────────────────────────
      - name: Build Storybook
        run: pnpm turbo build --filter=storybook --ui=stream

      # ── Accessibility audit (axe-core via Storybook test runner) ──────────
      - name: Install Playwright browsers
        run: pnpm --filter storybook exec playwright install chromium --with-deps

      - name: Accessibility tests
        run: |
          npx serve -s apps/storybook/storybook-static -l 6006 &
          npx wait-on http://localhost:6006
          cd apps/storybook && pnpm test-storybook --url http://localhost:6006 --ci
        env:
          CI: true

      # ── Drift check: Figma tokens vs tokens/ JSON ─────────────────────────
      - name: Token drift check
        if: github.event_name == 'pull_request'
        run: pnpm drift-check
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          FIGMA_FILE_KEY: bmFwMCXLLT9SKrsm1aDijr

      # ── Upload Storybook artifact ─────────────────────────────────────────
      - name: Upload Storybook
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: storybook
          path: apps/storybook/storybook-static
          retention-days: 30
