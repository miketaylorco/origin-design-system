name: Sync tokens from Figma

on:
  # Manual trigger — run when you've updated tokens in Figma
  workflow_dispatch:
  # Optional: run on a weekly schedule to catch Figma-side drift
  schedule:
    - cron: "0 9 * * 1" # 09:00 UTC every Monday

jobs:
  sync:
    name: Sync Figma tokens → tokens/ JSON
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync tokens from Figma
        run: pnpm sync-tokens
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          FIGMA_FILE_KEY: bmFwMCXLLT9SKrsm1aDijr

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet tokens/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Open PR with token changes
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/sync-tokens
          commit-message: "chore: sync design tokens from Figma"
          title: "chore: sync design tokens from Figma"
          body: |
            Automated token sync from Figma.

            Review the diff to ensure changes are expected before merging.
          labels: tokens, automated
